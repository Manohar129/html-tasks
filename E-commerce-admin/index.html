<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyleHub | Premium Fashion</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <nav>
        <div class="logo"><i class="fa-solid fa-bag-shopping"></i> StyleHub</div>
        <div class="search-container">
            <input type="text" id="searchInput" oninput="searchProducts()" placeholder="Search styles...">
        </div>
        <div class="nav-links">
            <button onclick="showSection('store')"><i class="fa-solid fa-shop"></i> Store</button>
            <button onclick="showSection('admin')" class="admin-toggle">Admin Panel</button>
        </div>
    </nav>

    <section id="storeView" class="view">
        <div class="hero">
            <h1>Elevate Your Style</h1>
            <p>Premium quality fashion for every generation.</p>
        </div>

        <div class="filter-bar">
            <button onclick="filterByCategory('All')" class="filter-btn active">All</button>
            <button onclick="filterByCategory('Men')" class="filter-btn">Men</button>
            <button onclick="filterByCategory('Women')" class="filter-btn">Women</button>
            <button onclick="filterByCategory('Kids')" class="filter-btn">Kids</button>
        </div>

        <div class="product-grid" id="productDisplay"></div>
    </section>

    <section id="adminView" class="view" style="display: none;">
        <div class="admin-panel">
            <div class="form-card">
                <h3>Add New Product</h3>
                <div class="input-grid">
                    <input type="text" id="pName" placeholder="Product Name">
                    <input type="number" id="pPrice" placeholder="Price (₹)">
                    <select id="pCategory">
                        <option value="Men">Men</option>
                        <option value="Women">Women</option>
                        <option value="Kids">Kids</option>
                    </select>
                    <input type="text" id="pImage" placeholder="Image URL">
                    <button onclick="addProduct()">Create Listing</button>
                </div>
            </div>

            <div class="table-card">
                <h3>Inventory Manager</h3>
                <table class="styled-table">
                    <thead>
                        <tr>
                            <th>Product Info</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
