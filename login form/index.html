<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyleHub | Account</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-wrapper">
        <div class="google-card">
            <div class="brand">StyleHub</div>
            <h1 id="formTitle">Sign in</h1>
            <p id="formSubtitle">Use your StyleHub Account</p>

            <div id="signupFields" style="display: none;">
                <div class="row">
                    <div class="input-container">
                        <input type="text" id="firstName" required>
                        <label>First name</label>
                    </div>
                    <div class="input-container">
                        <input type="text" id="lastName" required>
                        <label>Last name</label>
                    </div>
                </div>
                <div class="input-container">
                    <input type="tel" id="userPhone" required>
                    <label>Phone number</label>
                </div>
            </div>

            <div class="input-container">
                <input type="email" id="userEmail" required>
                <label>Email address</label>
            </div>

            <div class="input-container">
                <input type="password" id="userPass" required>
                <label>Password</label>
            </div>

            <div id="confirmField" style="display: none;">
                <div class="input-container">
                    <input type="password" id="confirmPass" required>
                    <label>Confirm password</label>
                </div>
            </div>

            <div class="action-row">
                <button onclick="toggleForm()" id="switchBtn" class="text-btn">Create account</button>
                <button onclick="handleAuth()" id="mainBtn" class="primary-btn">Next</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
