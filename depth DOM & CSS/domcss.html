<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Depth & Light Inspector</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Syne:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #030508;
    --card: #0a0e1a;
    --accent: #4f8ef7;
    --text: #ffffff;
    --light-x: 50%;
    --light-y: 50%;
  }

  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    /* This creates a floor grid for perspective */
    background-image: 
      linear-gradient(rgba(18, 24, 41, 0.4) 1px, transparent 1px),
      linear-gradient(90px, rgba(18, 24, 41, 0.4) 1px, transparent 1px);
    background-size: 40px 40px;
    background-position: center;
  }

  /* 1. PERSPECTIVE CONTAINER */
  .scene {
    perspective: 1200px;
    display: flex;
    gap: 40px;
    transform-style: preserve-3d;
  }

  /* 2. THE LIGHT SOURCE (Follows Mouse) */
  .light-glow {
    position: fixed;
    top: 0; left: 0;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(79, 142, 247, 0.15) 0%, transparent 70%);
    pointer-events: none;
    transform: translate(-50%, -50%);
    left: var(--light-x);
    top: var(--light-y);
    z-index: 1;
  }

  /* 3. CARD DESIGN (Visual Depth) */
  .layer-card {
    width: 220px;
    padding: 20px;
    background: var(--card);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    position: relative;
    transform-style: preserve-3d; /* CRITICAL for nested 3D */
    transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.5s;
    cursor: crosshair;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  /* Surface lighting effect */
  .layer-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), 
                rgba(255,255,255,0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Visual Depth Change on Hover */
  .layer-card:hover {
    transform: translateZ(60px) rotateX(5deg);
    border-color: var(--accent);
    box-shadow: 0 40px 80px rgba(0,0,0,0.7), 0 0 20px rgba(79, 142, 247, 0.2);
  }

  .label { font-size: 14px; font-weight: 800; color: var(--accent); }
  .badge { 
    display: inline-block;
    margin-top: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    background: rgba(255,255,255,0.05);
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* INFO PANEL */
  .info-hub {
    position: fixed;
    bottom: 40px;
    background: rgba(10, 14, 26, 0.9);
    border: 1px solid var(--accent);
    padding: 15px 30px;
    border-radius: 50px;
    display: flex;
    gap: 30px;
    backdrop-filter: blur(10px);
    z-index: 100;
  }
  .stat-item { font-family: 'Space Mono'; font-size: 12px; }
  .stat-item span { color: var(--accent); font-weight: bold; }
</style>
</head>
<body>

<div class="light-glow" id="light"></div>

<div class="info-hub">
  <div class="stat-item">DOM DEPTH: <span id="depthVal">--</span></div>
  <div class="stat-item">LIGHT SOURCE: <span id="lightVal">ACTIVE</span></div>
</div>

<div class="scene">
  <div class="layer-card" onmousemove="handleHover(event, this)">
    <div class="label">ROOT LAYER</div>
    <div class="badge">Elevation: Base</div>

    <div style="padding-top: 20px; transform-style: preserve-3d;">
      <div class="layer-card" style="width: 170px;" onmousemove="handleHover(event, this)">
        <div class="label">CHILD LAYER</div>
        <div class="badge">Nesting Level +1</div>
      </div>
    </div>
  </div>

  <div class="layer-card" onmousemove="handleHover(event, this)">
    <div class="label">SIBLING LAYER</div>
    <div class="badge">Elevation: Base</div>
  </div>
</div>

<script>
  // Track Light Source (Visual Depth Effect)
  document.addEventListener('mousemove', (e) => {
    document.documentElement.style.setProperty('--light-x', `${e.clientX}px`);
    document.documentElement.style.setProperty('--light-y', `${e.clientY}px`);
  });

  function handleHover(e, element) {
    e.stopPropagation(); // Prevents child hover from triggering parent
    
    // 1. Calculate Local Surface Light (Visual Depth)
    const rect = element.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 100;
    element.style.setProperty('--mouse-x', `${x}%`);
    element.style.setProperty('--mouse-y', `${y}%`);

    // 2. Calculate Logical DOM Depth
    let depth = 0;
    let current = element;
    while (current) {
      depth++;
      current = current.parentElement;
    }

    // 3. Update UI
    document.getElementById('depthVal').textContent = depth;
    
    // Change accent color based on depth
    const hue = (depth * 40) % 360;
    element.style.setProperty('--accent', `hsl(${hue}, 80%, 65%)`);
  }
</script>

</body>
</html>
